# Model configuration
cv_folds: 5
seed: 42
optuna_trials: 50

lgbm:
  fixed_params:
    objective: "multiclass"
    num_class: 3
    metric: "multi_logloss"
    verbosity: -1
    n_jobs: -1
  search_space:
    n_estimators: [200, 2000]
    learning_rate: [0.01, 0.3]
    max_depth: [3, 10]
    num_leaves: [15, 127]
    min_child_samples: [5, 100]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.5, 1.0]
    reg_alpha: [1.0e-8, 10.0]
    reg_lambda: [1.0e-8, 10.0]
  default_params:
    n_estimators: 1000
    learning_rate: 0.05
    max_depth: 7
    num_leaves: 63
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 1.0
    reg_lambda: 1.0

xgb:
  fixed_params:
    objective: "multi:softprob"
    num_class: 3
    eval_metric: "mlogloss"
    tree_method: "hist"
    n_jobs: -1
  search_space:
    n_estimators: [200, 2000]
    learning_rate: [0.01, 0.3]
    max_depth: [3, 10]
    min_child_weight: [1, 50]
    subsample: [0.6, 1.0]
    colsample_bytree: [0.5, 1.0]
    reg_alpha: [1.0e-8, 10.0]
    reg_lambda: [1.0e-8, 10.0]
    gamma: [0.0, 5.0]
  default_params:
    n_estimators: 1000
    learning_rate: 0.05
    max_depth: 7
    min_child_weight: 10
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 1.0
    reg_lambda: 1.0
    gamma: 0.1

logistic:
  max_iter: 1000
  C_range: [0.001, 100.0]

ensemble:
  method: "weighted_average"
